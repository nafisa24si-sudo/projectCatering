<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Circle background -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#C9A961" stroke-width="2"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="#C9A961" stroke-width="1" opacity="0.5"/>
  
  <!-- Left leaf -->
  <g transform="translate(50, 80) rotate(-45)">
    <path d="M 0 0 Q 2 8 0 16 Q -2 8 0 0" fill="#C9A961"/>
    <path d="M -8 0 Q -6 8 -8 16 Q -10 8 -8 0" fill="#C9A961"/>
    <path d="M 8 0 Q 10 8 8 16 Q 6 8 8 0" fill="#C9A961"/>
  </g>
  
  <!-- Food dome/cloche -->
  <g transform="translate(100, 90)">
    <!-- Base of dome -->
    <rect x="-25" y="8" width="50" height="8" fill="#3D2817" rx="2"/>
    <!-- Dome -->
    <path d="M -20 8 Q -20 -15 0 -20 Q 20 -15 20 8" fill="#3D2817" stroke="#5C4033" stroke-width="1"/>
    <!-- Dome shine -->
    <ellipse cx="-8" cy="-5" rx="6" ry="4" fill="white" opacity="0.3"/>
    <!-- Steam -->
    <path d="M -5 -22 Q -5 -26 -3 -30" stroke="#3D2817" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 0 -23 Q 0 -28 2 -32" stroke="#3D2817" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 5 -22 Q 5 -26 7 -30" stroke="#3D2817" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Handle -->
    <circle cx="0" cy="-18" r="3" fill="#3D2817"/>
  </g>
  
  <!-- Right spoon and fork -->
  <g transform="translate(135, 85)">
    <!-- Spoon -->
    <path d="M -5 0 L -5 20" stroke="#C9A961" stroke-width="2" fill="none" stroke-linecap="round"/>
    <ellipse cx="-5" cy="25" rx="5" ry="6" fill="#C9A961"/>
    
    <!-- Fork -->
    <path d="M 10 0 L 10 18" stroke="#C9A961" stroke-width="2" fill="none" stroke-linecap="round"/>
    <line x1="5" y1="20" x2="5" y2="28" stroke="#C9A961" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="10" y1="20" x2="10" y2="28" stroke="#C9A961" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="15" y1="20" x2="15" y2="28" stroke="#C9A961" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="155" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#3D2817" text-anchor="middle" letter-spacing="2">
    CATERING
  </text>
  <line x1="60" y1="162" x2="80" y2="162" stroke="#C9A961" stroke-width="1"/>
  <line x1="120" y1="162" x2="140" y2="162" stroke="#C9A961" stroke-width="1"/>
</svg>
