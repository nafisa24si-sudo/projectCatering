<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle background -->
  <circle cx="150" cy="150" r="145" fill="#8B4A2F"/>
  <circle cx="150" cy="150" r="138" fill="#D9895B"/>
  <circle cx="150" cy="150" r="132" fill="#FFF8F5"/>
  
  <!-- Decorative inner ring -->
  <circle cx="150" cy="150" r="125" fill="none" stroke="#8B4A2F" stroke-width="2"/>
  
  <!-- Left laurel leaves -->
  <g transform="translate(60, 110)">
    <path d="M 0 0 Q 5 15 0 30 Q -5 15 0 0" fill="#8B4A2F"/>
    <path d="M -10 5 Q -5 20 -10 35 Q -15 20 -10 5" fill="#8B4A2F"/>
    <path d="M 10 5 Q 15 20 10 35 Q 5 20 10 5" fill="#8B4A2F"/>
    <path d="M -8 15 Q -3 30 -8 45 Q -13 30 -8 15" fill="#8B4A2F"/>
    <path d="M 8 15 Q 13 30 8 45 Q 3 30 8 15" fill="#8B4A2F"/>
  </g>
  
  <!-- Right laurel leaves -->
  <g transform="translate(240, 110) scale(-1, 1)">
    <path d="M 0 0 Q 5 15 0 30 Q -5 15 0 0" fill="#8B4A2F"/>
    <path d="M -10 5 Q -5 20 -10 35 Q -15 20 -10 5" fill="#8B4A2F"/>
    <path d="M 10 5 Q 15 20 10 35 Q 5 20 10 5" fill="#8B4A2F"/>
    <path d="M -8 15 Q -3 30 -8 45 Q -13 30 -8 15" fill="#8B4A2F"/>
    <path d="M 8 15 Q 13 30 8 45 Q 3 30 8 15" fill="#8B4A2F"/>
  </g>
  
  <!-- Food dome/cloche -->
  <g transform="translate(150, 110)">
    <!-- Base of dome -->
    <rect x="-35" y="25" width="70" height="10" fill="#4B2E2A" rx="3"/>
    <!-- Dome -->
    <path d="M -30 25 Q -30 -30 0 -40 Q 30 -30 30 25" fill="#4B2E2A" stroke="#5C4033" stroke-width="2"/>
    <!-- Dome shine -->
    <ellipse cx="-10" cy="-10" rx="8" ry="6" fill="white" opacity="0.4"/>
    <!-- Steam -->
    <path d="M -8 -45 Q -8 -55 -4 -62" stroke="#D9895B" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 0 -47 Q 0 -58 4 -65" stroke="#D9895B" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 8 -45 Q 8 -55 12 -62" stroke="#D9895B" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Handle -->
    <circle cx="0" cy="-35" r="5" fill="#4B2E2A"/>
    <circle cx="0" cy="-35" r="3" fill="#D9895B"/>
  </g>
  
  <!-- Right spoon and fork -->
  <g transform="translate(200, 100)">
    <!-- Spoon -->
    <path d="M -8 0 L -8 25" stroke="#8B4A2F" stroke-width="3" fill="none" stroke-linecap="round"/>
    <ellipse cx="-8" cy="33" rx="7" ry="8" fill="#8B4A2F"/>
    
    <!-- Fork -->
    <path d="M 12 0 L 12 22" stroke="#8B4A2F" stroke-width="3" fill="none" stroke-linecap="round"/>
    <line x1="5" y1="24" x2="5" y2="34" stroke="#8B4A2F" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="24" x2="12" y2="34" stroke="#8B4A2F" stroke-width="2" stroke-linecap="round"/>
    <line x1="19" y1="24" x2="19" y2="34" stroke="#8B4A2F" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Text: Sajian Kita -->
  <text x="150" y="200" font-family="'Georgia', serif" font-size="36" font-weight="bold" fill="#8B4A2F" text-anchor="middle" letter-spacing="3" style="font-style: italic;">
    Sajian Kita
  </text>
  
  <!-- Decorative lines -->
  <line x1="80" y1="215" x2="110" y2="215" stroke="#D9895B" stroke-width="2"/>
  <line x1="190" y1="215" x2="220" y2="215" stroke="#D9895B" stroke-width="2"/>
  
  <!-- Small heart -->
  <path d="M 150 222 Q 145 218 143 222 Q 141 226 145 228 Q 150 232 155 228 Q 159 226 157 222 Q 155 218 150 222" fill="#8B4A2F"/>
  
  <!-- Text: CATERING -->
  <text x="150" y="250" font-family="'Arial', sans-serif" font-size="14" font-weight="bold" fill="#D9895B" text-anchor="middle" letter-spacing="8">
    CATERING
  </text>
  
  <!-- Tagline -->
  <text x="150" y="270" font-family="'Georgia', serif" font-size="10" fill="#8B4A2F" text-anchor="middle" letter-spacing="2">
    LEZAT · HIGIENIS · TERPERCAYA
  </text>
</svg>